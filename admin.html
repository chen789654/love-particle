<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>链接生成器 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#0a0a12;color:#e8e8f0;min-height:100vh;padding:24px;display:flex;flex-direction:column;align-items:center}
.card{background:#12121e;border:1px solid #1e1e2e;border-radius:16px;padding:32px;width:100%;max-width:520px;margin:auto}
h1{font-size:1.1rem;font-weight:600;margin-bottom:4px;letter-spacing:1px}
.sub{font-size:0.8rem;color:#555;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:0.78rem;color:#888;letter-spacing:1px;margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 14px;border-radius:8px;background:#0a0a14;border:1px solid #2a2a3a;color:#e8e8f0;font-size:0.9rem;outline:none;transition:border .2s}
.field input:focus,.field select:focus{border-color:#f06a8a}
.field-row{display:flex;gap:8px}
.field-row input{flex:1;min-width:0}

/* ── URL 显示 ── */
.url-box{background:#0a0a14;border:1px solid #2a2a3a;border-radius:10px;padding:14px 16px;margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.url-box code{font-size:0.78rem;color:#f0c8a0;word-break:break-all;flex:1;font-family:'SF Mono','Fira Code',monospace}
.btn{background:#f06a8a22;color:#f06a8a;border:1px solid #f06a8a44;padding:7px 18px;border-radius:6px;font-size:0.82rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{background:#f06a8a44}
.btn.done{background:#22c55e22;color:#22c55e;border-color:#22c55e44}

/* ── 卡片展示 ── */
.qr-section{border-top:1px solid #1e1e2e;margin-top:20px;padding-top:20px;text-align:center}
.qr-section .label{font-size:0.78rem;color:#555;letter-spacing:1px;margin-bottom:12px}
.card-preview{display:inline-block;border-radius:14px;overflow:hidden;box-shadow:0 0 40px rgba(240,106,138,0.12)}
.card-preview canvas{display:block;max-width:100%;height:auto}
.qr-actions{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a28;border:1px solid #2a2a3a;padding:10px 24px;border-radius:10px;font-size:0.85rem;color:#e8e8f0;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="card">
  <h1>🔧 链接生成器</h1>
  <div class="sub">填好信息 → 下载告白卡片 → 发给顾客</div>

  <div class="field">
    <label>收件人</label>
    <input type="text" id="bTo" value="小美" maxlength="12">
  </div>
  <div class="field">
    <label>寄件人</label>
    <input type="text" id="bFrom" value="小明" maxlength="12">
  </div>
  <div class="field">
    <label>主题色</label>
    <select id="bTheme">
      <option value="r">❤️ 红色</option>
      <option value="p">💗 粉色</option>
      <option value="b">💙 蓝色</option>
      <option value="v">💜 紫色</option>
      <option value="w">🧡 暖橘</option>
    </select>
  </div>
  <div class="field">
    <label>漂浮文字（1~5，留空不显示）</label>
    <div class="field-row">
      <input type="text" id="bT1" value="勇气" maxlength="6" placeholder="文1">
      <input type="text" id="bT2" value="陪伴" maxlength="6" placeholder="文2">
      <input type="text" id="bT3" value="珍惜" maxlength="6" placeholder="文3">
      <input type="text" id="bT4" value="守护" maxlength="6" placeholder="文4">
      <input type="text" id="bT5" value="坦荡" maxlength="6" placeholder="文5">
    </div>
  </div>

  <div class="url-box">
    <code id="bUrl">https://love-particle.netlify.app/?to=小美&from=小明</code>
    <button class="btn" id="bCopy">📋 复制</button>
  </div>

  <!-- ═══ 告白卡片 ═══ -->
  <div class="qr-section" id="qrSection">
    <div class="label">💌 顾客收到的告白卡片</div>
    <div class="card-preview">
      <canvas id="cardCanvas" width="500" height="620"></canvas>
    </div>
    <div class="qr-actions">
      <button class="btn" id="bDownload">⬇️ 下载卡片</button>
      <button class="btn" id="bPreview">👁 预览粒子效果</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  配置
// ══════════════════════════════════════════

const QR_API='https://api.qrserver.com/v1/create-qr-code/?size=320x320&bgcolor=ffffff&data=';
const CARD_W=500, CARD_H=620;
const THEME_COLORS={
  r:{primary:'#ff2d55',dark:'#cc0022',bg1:'#0a0306',bg2:'#1a0a12',glow:'rgba(255,45,85,0.15)'},
  p:{primary:'#ff4d8a',dark:'#cc2255',bg1:'#10050a',bg2:'#1a0a14',glow:'rgba(255,77,138,0.15)'},
  b:{primary:'#0077ff',dark:'#0044aa',bg1:'#050510',bg2:'#0a0a1a',glow:'rgba(0,119,255,0.15)'},
  v:{primary:'#6c5ce7',dark:'#4433aa',bg1:'#080510',bg2:'#100a1a',glow:'rgba(108,92,231,0.15)'},
  w:{primary:'#ff6b35',dark:'#cc4400',bg1:'#0a0805',bg2:'#1a0e08',glow:'rgba(255,107,53,0.15)'},
};

// ══════════════════════════════════════════
//  DOM 引用
// ══════════════════════════════════════════

function getBase(){
  let p=location.pathname;
  p=p.replace(/admin\.html$/,'');
  if(!p.endsWith('/'))p+='/';
  return location.origin+p;
}
const BASE=getBase();
const $=id=>document.getElementById(id);
const toEl=$('bTo'),fromEl=$('bFrom'),themeEl=$('bTheme');
const t1=$('bT1'),t2=$('bT2'),t3=$('bT3'),t4=$('bT4'),t5=$('bT5');
const urlEl=$('bUrl'),copyEl=$('bCopy'),toast=$('toast');
const canvas=$('cardCanvas'),ctx=canvas.getContext('2d');
const downloadBtn=$('bDownload'),previewBtn=$('bPreview');

let currentUrl='';

// ══════════════════════════════════════════
//  绘制告白卡片
// ══════════════════════════════════════════

function drawCard(qrImg){
  const to=toEl.value.trim()||'TA';
  const from=fromEl.value.trim()||'';
  const theme=THEME_COLORS[themeEl.value]||THEME_COLORS.r;

  ctx.clearRect(0,0,CARD_W,CARD_H);

  // ── 背景渐变 ──
  const bg=ctx.createRadialGradient(250,250,50,250,250,450);
  bg.addColorStop(0,theme.bg2);
  bg.addColorStop(1,theme.bg1);
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,CARD_W,CARD_H);

  // ── 发光光晕 ──
  const glow=ctx.createRadialGradient(250,200,10,250,200,200);
  glow.addColorStop(0,theme.glow);
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;
  ctx.fillRect(0,0,CARD_W,350);

  // ── 顶部装饰线 ──
  ctx.shadowColor=theme.primary;
  ctx.shadowBlur=20;
  ctx.strokeStyle=theme.primary;
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(100,38);
  ctx.lineTo(250,38);
  ctx.lineTo(400,38);
  ctx.stroke();
  ctx.shadowBlur=0;

  // ── 顶部爱心 ──
  ctx.font='28px sans-serif';
  ctx.textAlign='center';
  ctx.fillStyle='#fff';
  ctx.fillText('💕',250,82);

  // ── 收件人 ──
  ctx.font='bold 28px "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.shadowColor=theme.primary;
  ctx.shadowBlur=30;
  ctx.fillStyle=theme.primary;
  ctx.fillText('给 '+to,250,130);

  // ── "专属告白" ──
  ctx.shadowBlur=0;
  ctx.font='18px "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('专 属 告 白',250,166);

  // ── 分隔线 ──
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(80,190);
  ctx.lineTo(420,190);
  ctx.stroke();

  // ── 二维码 ──
  if(qrImg && qrImg.complete && qrImg.naturalWidth>0){
    const qrSize=240;
    const qrX=(CARD_W-qrSize)/2;
    const qrY=210;
    // 白色底
    ctx.shadowColor='rgba(0,0,0,0.3)';
    ctx.shadowBlur=20;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.roundRect(qrX-8,qrY-8,qrSize+16,qrSize+16,8);
    ctx.fill();
    ctx.shadowBlur=0;
    // 二维码
    ctx.drawImage(qrImg,qrX,qrY,qrSize,qrSize);
  }

  // ── 底部文字 ──
  ctx.font='14px "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText('扫码开启专属浪漫',250,494);

  // ── 寄件人 ──
  if(from){
    ctx.font='16px "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='right';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('—— '+from,460,580);
  }

  // ── 小粒子装饰（角落） ──
  drawSparkle(ctx,60,500,theme.primary);
  drawSparkle(ctx,440,80,theme.primary);
  drawSparkle(ctx,420,540,theme.primary);
  drawSparkle(ctx,80,120,theme.primary);
}

function drawSparkle(ctx,x,y,color){
  ctx.save();
  ctx.translate(x,y);
  ctx.shadowColor=color;
  ctx.shadowBlur=12;
  ctx.fillStyle=color;
  ctx.globalAlpha=0.4;
  ctx.beginPath();
  ctx.arc(0,0,3,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=0.15;
  ctx.beginPath();
  ctx.arc(0,0,7,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// roundRect polyfill for canvas
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(r>w/2)r=w/2;
    if(r>h/2)r=h/2;
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r);
    return this;
  };
}

// ══════════════════════════════════════════
//  更新卡片
// ══════════════════════════════════════════

let qrCache=null;

function buildUrl(){
  const p=new URLSearchParams();
  const v=toEl.value.trim();if(v)p.set('to',v);
  const f=fromEl.value.trim();if(f)p.set('from',f);
  const t=themeEl.value;
  if(t!=='r')p.set('t',t);
  [t1,t2,t3,t4,t5].forEach((el,i)=>{
    const val=el.value.trim();if(val)p.set('text'+(i+1),val);
  });
  const q=p.toString();
  currentUrl=BASE+(q?'?'+q:'');
  urlEl.textContent=currentUrl;

  // 加载 QR 码图片，然后绘制卡片
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    qrCache=img;
    drawCard(img);
  };
  img.onerror=function(){
    drawCard(null);
  };
  img.src=QR_API+encodeURIComponent(currentUrl);
}

function update(){buildUrl()}

[toEl,fromEl,t1,t2,t3,t4,t5].forEach(el=>el.addEventListener('input',update));
themeEl.addEventListener('change',update);

// ══════════════════════════════════════════
//  复制链接
// ══════════════════════════════════════════

copyEl.addEventListener('click',function(){
  navigator.clipboard.writeText(currentUrl).then(()=>{
    copyEl.textContent='✅ 已复制';
    copyEl.classList.add('done');
    setTimeout(()=>{copyEl.textContent='📋 复制';copyEl.classList.remove('done');},2000);
  }).catch(()=>{
    toast.textContent='复制失败，请手动选择复制';
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2500);
  });
});

// ══════════════════════════════════════════
//  下载卡片
// ══════════════════════════════════════════

downloadBtn.addEventListener('click',function(){
  const name=toEl.value.trim()||'love';
  canvas.toBlob(function(blob){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=name+'-告白卡片.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  },'image/png');
});

// ══════════════════════════════════════════
//  预览效果
// ══════════════════════════════════════════

previewBtn.addEventListener('click',function(){
  window.open(currentUrl,'_blank');
});

// ══════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════

buildUrl();
</script>
</body>
</html>
